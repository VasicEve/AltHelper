name: build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          # .slnx solutions need SDK 9.0.2xx+; the app itself targets net8.0-windows
          dotnet-version: 10.0.x

      - name: Build
        run: dotnet build MouseToPad.slnx -c Release

      - name: Install Inno Setup (if missing)
        shell: powershell
        run: |
          if (-not (Test-Path "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe")) {
            choco install innosetup -y --no-progress
          }

      - name: Build installer
        shell: powershell
        run: .\scripts\build-installer.ps1 -NoLaunch

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: MouseToPadSetup
          path: installer/MouseToPadSetup.exe
